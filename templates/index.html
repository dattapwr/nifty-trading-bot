<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>Advanced Scanner</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 25px; border-radius: 15px; border-top: 5px solid #ef4444; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #334155; color: #f87171; text-transform: uppercase; font-size: 12px; }
        .buy-zone { color: #4ade80; font-weight: bold; }
        .sell-zone { color: #f87171; font-weight: bold; }
        .sl-zone { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 Advanced Sell Scanner</h2>
        <p>फिल्टर: ९:३० नंतर + कालच्या क्लोजिंगपेक्षा खाली + हिरवी कॅन्डल लो ब्रेकआऊट</p>
        <form action="/" method="get">
            <input type="date" name="start_date" required>
            <input type="date" name="end_date" required>
            <button type="submit" style="background:#ef4444; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">बॅकटेस्ट</button>
        </form>
    </div>

    {% if bt_results %}
    <table>
        <thead>
            <tr>
                <th>वेळ</th>
                <th>स्टॉक</th>
                <th>एंट्री (SELL)</th>
                <th>Stop Loss (High)</th>
                <th>Target (1:2)</th>
            </tr>
        </thead>
        <tbody>
            {% for r in bt_results %}
            <tr>
                <td>{{ r.t }}</td>
                <td>{{ r.s }}</td>
                <td class="sell-zone">₹{{ r.p }}</td>
                <td class="sl-zone">₹{{ r.sl }}</td>
                <td class="buy-zone">₹{{ r.tgt }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% endif %}
</body>
</html>
