<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crude Oil Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; padding: 20px; }
        .signal-card { background: #161b22; border-left: 10px solid #238636; border-radius: 10px; padding: 20px; margin-bottom: 15px; }
        .buy-badge { background-color: #238636; color: white; padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container text-center">
        <h2 class="mb-4 text-warning">⛽ Crude Oil Live Signal (Engulfing)</h2>
        
        {% for s in stocks %}
        <div class="signal-card shadow">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h4>{{ s.s }}</h4>
                    <small class="text-muted">{{ s.t }}</small>
                </div>
                <div>
                    <span class="buy-badge">STRONG BUY</span>
                    <h3 class="mt-2">₹{{ s.p }}</h3>
                </div>
            </div>
        </div>
        {% else %}
        <div class="alert alert-secondary">अजून कोणताही ब्रेकआऊट मिळालेला नाही. शोध सुरू आहे...</div>
        {% endfor %}
    </div>

    <script>
        // दर ३० सेकंदाला पेज ऑटो रिफ्रेश होईल
        setTimeout(function(){ location.reload(); }, 30000);
    </script>
</body>
</html>
