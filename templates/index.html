<table>
    <tr>
        <th>वेळ</th>
        <th>स्टॉक</th>
        <th>सिग्नल</th>
        <th>ब्रेकआउट किंमत</th>
        <th>हिरव्या कॅन्डलचा Low</th>
    </tr>
    {% for r in bt_results %}
    <tr>
        <td>{{ r.t }}</td>
        <td>{{ r.s }}</td>
        <td style="color: #f87171; font-weight: bold;">{{ r.type }}</td>
        <td>₹{{ r.p }}</td>
        <td>₹{{ r.signal_low }}</td>
    </tr>
    {% endfor %}
</table>
