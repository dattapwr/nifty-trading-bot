<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>इंट्राडे ट्रेडिंग स्कॅनर</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .card { background: #1e293b; padding: 25px; border-radius: 15px; border-left: 5px solid #ef4444; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .symbol { font-size: 1.5em; font-weight: bold; color: #38bdf8; }
        .price { font-size: 1.2em; margin: 10px 0; color: #4ade80; }
        .sector { font-size: 0.9em; color: #94a3b8; margin-bottom: 10px; }
        .time { font-size: 0.8em; color: #64748b; }
        h1 { color: #f8fafc; margin-bottom: 30px; }
    </style>
</head>
<body>
    <h1>🚩 टॉप डाउन सेक्टर स्टॉक फिल्टर</h1>
    <div class="grid">
        {% if stocks %}
            {% for s in stocks %}
                <div class="card">
                    <div class="sector">{{ s.sec }} Sector</div>
                    <div class="symbol">{{ s.s }}</div>
                    <div class="price">₹{{ s.p }}</div>
                    <div class="time">स्कॅन वेळ: {{ s.t }}</div>
                </div>
            {% endfor %}
        {% else %}
            <p>सध्या कोणतीही संधी सापडली नाही. कृपया थोड्या वेळाने रिफ्रेश करा.</p>
        {% endif %}
    </div>
</body>
</html>
