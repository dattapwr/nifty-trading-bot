<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>दत्ता - ट्रेडिंग बॉट</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #1a1a1a; color: #ffffff; padding-top: 50px; }
        .container { border: 2px solid #4CAF50; display: inline-block; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(76, 175, 80, 0.3); }
        h1 { color: #4CAF50; }
        .price-box { font-size: 48px; font-weight: bold; margin: 20px 0; color: #ffd700; }
        .btn { background-color: #4CAF50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; cursor: pointer; border: none; }
        .btn:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <div class="container">
        <h1>दत्ता, निफ्टी ५० चा चालू भाव</h1>
        <div class="price-box">₹ {{ price }}</div>
        <button class="btn" onclick="window.location.reload();">किंमत अपडेट करा</button>
        <p style="font-size: 12px; color: #888; margin-top: 20px;">डेटा Yahoo Finance वरून घेतला आहे.</p>
    </div>
</body>
</html>
