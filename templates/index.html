<div style="display: flex; gap: 20px; margin-bottom: 20px;">
    <div class="card" style="flex: 1; text-align: center; border-top: 5px solid #4ade80;">
        <h2 style="color: {{ '#4ade80' if total_pnl >= 0 else '#f87171' }}">₹{{ total_pnl }}</h2>
        <p>एकूण नफा/तोटा (P&L)</p>
    </div>
    <div class="card" style="flex: 1; text-align: center; border-top: 5px solid #fbbf24;">
        <h2 style="color: #fbbf24;">{{ win_rate }}%</h2>
        <p>Success Rate</p>
    </div>
</div>

<table>
    <thead>
        <tr>
            <th>वेळ</th>
            <th>स्टॉक</th>
            <th>Qty</th>
            <th>एंट्री</th>
            <th>निकाल</th>
            <th>नफा/तोटा</th>
        </tr>
    </thead>
    <tbody>
        {% for r in bt_results %}
        <tr>
            <td>{{ r.t }}</td>
            <td>{{ r.s }}</td>
            <td>{{ r.qty }}</td>
            <td>₹{{ r.p }}</td>
            <td style="font-weight:bold; color: {{ '#4ade80' if 'Target' in r.res else '#f87171' if 'SL' in r.res else 'white' }}">
                {{ r.res }}
            </td>
            <td style="font-weight:bold; color: {{ '#4ade80' if r.pnl > 0 else '#f87171' if r.pnl < 0 else 'white' }}">
                {{ '₹' + r.pnl|string if r.pnl != 0 else '-' }}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
