<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>दत्ता - ट्रेडिंग स्कॅनर</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .btn-bt { background-color: #238636; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block; margin: 20px 0; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; }
        .card { background: #161b22; border: 1px solid #30363d; margin: 10px; padding: 15px; border-radius: 12px; cursor: pointer; width: 140px; transition: 0.3s; }
        .card:hover { border-color: #58a6ff; }
        #chart-container { width: 95%; height: 500px; margin: 20px auto; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }
    </style>
</head>
<body>
    <h1>📈 दत्ता ट्रेडिंग बॉट</h1>
    
    <a href="/backtest" class="btn-bt">📊 बॅकटिस्ट रिपोर्ट पहा</a>

    <div class="container">
        {% if stocks %}
            {% for stock in stocks %}
            <div class="card" onclick="changeChart('{{ stock.symbol }}')">
                <h3>{{ stock.symbol }}</h3>
                <p>₹{{ stock.price }}</p>
                <small style="color: #8b949e;">चार्ट पहा</small>
            </div>
            {% endfor %}
        {% else %}
            <p style="color: #8b949e;">सध्या कोणताही स्टॉक सापडला नाही. (मार्केट सुरू असताना तपासा)</p>
        {% endif %}
    </div>

    <div id="chart-container">
        <div id="tradingview_widget" style="height: 100%;"></div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function changeChart(sym) {
            let ticker = sym.replace('.NS', '');
            new TradingView.widget({
                "width": "100%", "height": "100%", "symbol": "NSE:" + ticker,
                "interval": "5", "timezone": "Asia/Kolkata", "theme": "dark",
                "style": "1", "container_id": "tradingview_widget"
            });
        }
        changeChart('NIFTY'); // सुरुवातीला निफ्टी दिसेल
    </script>
</body>
</html>
