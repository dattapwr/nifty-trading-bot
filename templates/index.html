<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>दत्ता ट्रेडिंग स्कॅनर</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card { background: #161b22; border: 2px solid #30363d; margin: 10px; padding: 20px; border-radius: 12px; cursor: pointer; transition: 0.3s; width: 150px; }
        .card:hover { border-color: #58a6ff; }
        #chart-box { width: 90%; height: 500px; margin: 20px auto; border: 2px solid #30363d; border-radius: 15px; overflow: hidden; }
    </style>
</head>
<body>
    <h1>📈 आजचे सापडलेले स्टॉक्स</h1>
    <div class="container">
        {% for stock in stocks %}
        <div class="card" onclick="showChart('{{ stock.symbol }}')">
            <h3>{{ stock.symbol }}</h3>
            <p>₹{{ stock.price }}</p>
        </div>
        {% endfor %}
    </div>

    <div id="chart-box">
        <div id="tradingview_widget"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function showChart(symbol) {
            let cleanSym = symbol.replace('.NS', '');
            new TradingView.widget({
                "width": "100%", "height": "100%", "symbol": "NSE:" + cleanSym,
                "interval": "5", "timezone": "Asia/Kolkata", "theme": "dark", "style": "1",
                "container_id": "tradingview_widget"
            });
        }
        showChart('NIFTY'); // सुरुवातीला निफ्टी दिसेल
    </script>
</body>
</html>
