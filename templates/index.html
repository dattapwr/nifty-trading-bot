<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>दत्ता ट्रेडिंग लाईव्ह</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid #334155; }
        .symbol { font-size: 1.4em; color: #38bdf8; font-weight: bold; }
        .time { font-size: 0.9em; color: #94a3b8; }
    </style>
</head>
<body>
    <h1>📊 लाईव्ह सिग्नल्स (१८०+ स्टॉक)</h1>
    <div class="grid">
        {% if stocks %}
            {% for s in stocks %}
                <div class="card">
                    <div class="symbol">{{ s.symbol }}</div>
                    <div style="color: #4ade80; font-size: 1.2em; margin: 5px 0;">₹{{ s.price }}</div>
                    <div class="time">वेळ: {{ s.time }}</div>
                </div>
            {% endfor %}
        {% else %}
            <p>सध्या कोणताही स्टॉक स्ट्रॅटेजीमध्ये नाही.</p>
        {% endif %}
    </div>
</body>
</html>
