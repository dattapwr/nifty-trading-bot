<table>
    <thead>
        <tr>
            <th>वेळ</th>
            <th>स्टॉक</th>
            <th>एंट्री किंमत</th>
            <th>Stop Loss (SL)</th>
            <th>Target (1:2)</th>
        </tr>
    </thead>
    <tbody>
        {% for r in bt_results %}
        <tr>
            <td>{{ r.t }}</td>
            <td>**{{ r.s }}**</td>
            <td style="color: #f87171;">₹{{ r.p }}</td>
            <td style="color: #fbbf24;">₹{{ r.sl }}</td>
            <td style="color: #4ade80;">₹{{ r.tgt }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
