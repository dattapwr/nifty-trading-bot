<!DOCTYPE html>
<html>
<head>
    <title>MCX Scanner</title>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Arial'; text-align: center; padding-top: 50px; }
        .box { border: 3px solid #2ebd85; display: inline-block; padding: 40px; border-radius: 20px; background: #1e2329; }
        .price { font-size: 80px; color: #2ebd85; margin: 10px; }
        .status { font-size: 20px; color: #848e9c; }
    </style>
</head>
<body>
    <div class="box">
        <h2>CRUDE OIL MAR FUT</h2>
        <div class="price">₹{{ price }}</div>
        <div class="status">Status: {{ signal }} | Last Update: {{ time }}</div>
    </div>
    <script>setTimeout(function(){ location.reload(); }, 60000);</script>
</body>
</html>
